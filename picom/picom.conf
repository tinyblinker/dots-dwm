# -----------------------------
# Basic
# -----------------------------
backend = "glx";
vsync = true;

# -----------------------------
# Shadows
# -----------------------------
shadow = true;
shadow-radius = 12;
shadow-opacity = 0.18;
shadow-offset-x = -3;
shadow-offset-y = -3;
shadow-exclude = [
  "name = 'Notification'",
];

# -----------------------------
# Transparency / opacity
# -----------------------------
inactive-opacity = 0.7;
active-opacity = 1.0;
frame-opacity = 1.0;

# 窗口类型透明度
opacity-rule = [
  "80:class_g = 'kitty'",
  "100:class_g *?= 'firefox'",
  "100:class_g *?= 'chromium'",
  "100:fullscreen",
];

# -----------------------------
# Blur
# -----------------------------
blur-method = "dual_kawase";
blur-strength = 7;

# 排除模糊的窗口
blur-background-exclude = [
  "class_g *?= 'firefox'",
  "class_g *?= 'chromium'",
  "fullscreen",
  "class_g = 'dmenu'",
];

# -----------------------------
# Fading
# -----------------------------
fading = true;
fade-delta = 4.5;
fade-in-step = 0.03;
fade-out-step = 0.03;

# -----------------------------
# Window type settings
# -----------------------------
wintypes:
{
  tooltip = { fade = true; shadow = false; };
  dock = { shadow = false; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 0.95; };
  dropdown_menu = { opacity = 0.95; };
};

# -----------------------------
# General exclusions
# -----------------------------
focus-exclude = [
#  "class_g = 'Conky'"
];
